<!DOCTYPE html>
<html lang="km" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>បញ្ជីទិញរបស់ខ្ញុំ - Pizza King</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="notranslate">

<div id="loader"><img src="logo.png" class="loader-img"><div style="font-weight:700; color:var(--pizz-red); margin-top:15px;">🚀 កំពុងទាញយកទិន្នន័យ...</div></div>

<div id="app-shell">
    <div class="master-header">📦 បញ្ជីទិញរបស់ខ្ញុំ</div>

    <div class="container" id="main-container">
        </div>

    <div id="detail-modal" class="modal-overlay">
        <div class="isolated-note-card">
            <button class="close-x" onclick="closeDetails()">×</button>
            <h3 style="margin:0 0 5px 0; color:#2c3e50;">វិក្កយបត្រ (Invoice)</h3>
            <div id="modal-order-id" style="color:#7f8c8d; font-size:0.8rem; margin-bottom:10px;"></div>
            <div style="overflow-y:auto; max-height: 200px; text-align:left;" id="modal-items-list"></div>
            <div style="margin-top:15px; border-top:2px solid #eee; padding-top:15px;">
                <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.2rem; color:var(--pizz-red);">
                    <span>សរុប៖</span><span id="modal-total">0៛</span>
                </div>
            </div>
        </div>
    </div>

    <div id="cancel-modal" class="modal-overlay">
        <div class="isolated-note-card">
            <button class="close-x" onclick="closeCancelModal()">×</button>
            <div style="font-size:3rem; margin-bottom:10px;">⚠️</div>
            <h3 style="margin:0 0 10px 0; color:var(--pizz-red);">ស្នើសុំបោះបង់ / បង្វិលប្រាក់</h3>
            <p style="font-size:0.85rem; color:#7f8c8d; line-height:1.5; margin-bottom:20px;">សូមបញ្ជាក់ពីមូលហេតុនៃការបោះបង់ការកម្ម៉ង់ <strong id="cancel-order-id"></strong>។ ក្រុមការងារនឹងទាក់ទងទៅអ្នកវិញតាម Telegram។</p>
            <textarea id="cancel-reason" placeholder="ឧទាហរណ៍៖ កម្ម៉ង់ខុស..." style="height:100px;"></textarea>
            <button class="btn-paid-final" onclick="submitCancelRequest()" style="margin-bottom:0;">បញ្ជូនការស្នើសុំ</button>
        </div>
    </div>

    <div id="bottom-nav-placeholder"></div>
</div>

<script src="nav.js"></script>
<script src="pwa.js"></script>
<script>
    loadBottomNav('orders'); 
    
    // WordPress Backend Database link
    const WC_BASE = "https://1.phsar.me/wp-json/wc/v3";
    const AUTH = "?consumer_key=ck_6a9c8caa18a2b0ab114ef90bb9e982d69521ec03&consumer_secret=cs_63c256e1b4eba0a65723f054159e55d2148c3c57";
    
    let globalOrders = []; let currentCancelOrderId = null;
    const statusMap = { 'pending': { text: '⏳ រង់ចាំការយល់ព្រម', class: 'status-pending' }, 'processing': { text: '👨‍🍳 កំពុងរៀបចំ', class: 'status-processing' }, 'on-hold': { text: '⏳ កំពុងផ្ទៀងផ្ទាត់', class: 'status-pending' }, 'completed': { text: '✅ ជោគជ័យ', class: 'status-completed' }, 'cancelled': { text: '❌ បានបោះបង់', class: 'status-cancelled' }, 'refunded': { text: '💵 បានបង្វិលប្រាក់', class: 'status-refunded' }, 'failed': { text: '⚠️ បរាជ័យ', class: 'status-cancelled' } };

    function initPage() {
        const phone = localStorage.getItem('pizz_user_phone') || localStorage.getItem('pizz_king_tel');
        if (!phone) { renderLogin(); document.getElementById('loader').style.display = 'none'; } 
        else { fetchUserOrders(phone); }
    }

    function renderLogin() {
        document.getElementById('main-container').innerHTML = `<div class="login-box"><div style="font-size:3rem; margin-bottom:10px;">📱</div><h3 style="margin:0 0 10px 0; color:var(--pizz-dark);">ស្វែងរកបញ្ជីទិញរបស់អ្នក</h3><p style="font-size:0.85rem; color:#7f8c8d; line-height:1.5;">សូមបញ្ចូលលេខទូរស័ព្ទដែលអ្នកបានប្រើប្រាស់ពេលកម្ម៉ង់ទិញ។</p><input type="tel" id="manual-phone" placeholder="បញ្ចូលលេខទូរស័ព្ទ..."><button class="btn-paid-final" onclick="manualLogin()">ស្វែងរកការកម្ម៉ង់</button></div>`;
    }

    function manualLogin() {
        const input = document.getElementById('manual-phone').value;
        if(input.length > 8) { localStorage.setItem('pizz_user_phone', input); document.getElementById('loader').style.display = 'flex'; fetchUserOrders(input); } 
        else { alert("សូមបញ្ចូលលេខទូរស័ព្ទឲ្យបានត្រឹមត្រូវ!"); }
    }

    async function fetchUserOrders(phoneNumber) {
        try {
            // FIX: Explicitly exclude trash by defining exactly what statuses we DO want to see.
            const statusFilter = "pending,processing,on-hold,completed,cancelled,refunded,failed";
            const res = await fetch(`${WC_BASE}/orders${AUTH}&search=${phoneNumber}&status=${statusFilter}`); 
            
            const orders = await res.json(); 
            globalOrders = orders; 
            document.getElementById('loader').style.display = 'none';
            
            if(orders.length === 0) {
                document.getElementById('main-container').innerHTML = `<div style="text-align:center; margin-top:50px;"><div style="font-size:4rem; margin-bottom:15px; opacity:0.5;">🛒</div><h3 style="color:#2c3e50;">មិនមានប្រវត្តិទិញទេ</h3><p style="color:#7f8c8d; font-size:0.9rem;">លេខទូរស័ព្ទ <strong>${phoneNumber}</strong> មិនទាន់មានទិន្នន័យកម្ម៉ង់ទេ។</p><button class="btn-paid-final" style="width:auto; padding:10px 30px; margin-top:20px;" onclick="window.location.href='index.html'">ទៅកាន់ទំព័រដើម</button><br><br><button onclick="localStorage.removeItem('pizz_user_phone'); location.reload();" style="background:none; border:none; color:var(--pizz-red); font-weight:700; cursor:pointer;">ប្តូរលេខទូរស័ព្ទ</button></div>`;
            } else { renderOrdersList(orders, phoneNumber); }
        } catch (e) { 
            document.getElementById('loader').style.display = 'none'; 
            document.getElementById('main-container').innerHTML = `<div style="text-align:center; color:var(--pizz-red); margin-top:40px; font-weight:bold;">⚠️ បញ្ហាប្រព័ន្ធអុីនធឺណិត។</div>`; 
        }
    }

    function formatDate(dateString) { const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }; return new Date(dateString).toLocaleDateString('km-KH', options); }

    function renderOrdersList(orders, phone) {
        let html = `<div style="font-size:0.85rem; color:#7f8c8d; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;"><span>គណនី: <strong style="color:var(--pizz-dark);">${phone}</strong></span><button onclick="localStorage.removeItem('pizz_user_phone'); location.reload();" style="background:none; border:none; color:var(--pizz-red); font-weight:700; font-size:0.75rem; cursor:pointer;">ចាកចេញ</button></div>`;
        orders.forEach(order => {
            const statusConfig = statusMap[order.status] || { text: order.status, class: 'status-pending' };
            const itemsPreview = order.line_items.map(i => `${i.name} (x${i.quantity})`).join(', ');
            const canCancel = ['pending', 'processing', 'on-hold'].includes(order.status);
            const cancelBtnHTML = canCancel ? `<button class="btn-danger-outline" onclick="openCancelModal(${order.id})">ស្នើសុំបោះបង់</button>` : `<button class="btn-outline" onclick="window.location.href='index.html'">ទិញម្ដងទៀត</button>`;
            html += `<div class="order-card"><div class="order-header"><div><div class="order-id">#${order.id}</div><div class="order-date">📅 ${formatDate(order.date_created)}</div></div><div class="status-badge ${statusConfig.class}">${statusConfig.text}</div></div><div class="order-items-preview">📦 ${itemsPreview}</div><div class="order-total">${parseFloat(order.total).toLocaleString()}៛</div><div class="btn-group"><button class="btn-outline" onclick="openDetails(${order.id})"><svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg> មើលលម្អិត</button>${cancelBtnHTML}</div></div>`;
        });
        document.getElementById('main-container').innerHTML = html;
    }

    function openDetails(orderId) {
        const order = globalOrders.find(o => o.id === orderId); if(!order) return;
        document.getElementById('modal-order-id').innerText = `លេខកូដវិក្កយបត្រ: #${order.id}`;
        document.getElementById('modal-items-list').innerHTML = order.line_items.map(item => `<div class="detail-item-row"><span style="font-weight:700; max-width:70%;">${item.name} <span style="color:var(--pizz-red);">x${item.quantity}</span></span><span>${parseFloat(item.total).toLocaleString()}៛</span></div>`).join('');
        document.getElementById('modal-total').innerText = `${parseFloat(order.total).toLocaleString()}៛`;
        document.getElementById('detail-modal').style.display = 'flex';
    }

    function closeDetails() { document.getElementById('detail-modal').style.display = 'none'; }
    function openCancelModal(orderId) { currentCancelOrderId = orderId; document.getElementById('cancel-order-id').innerText = `#${orderId}`; document.getElementById('cancel-reason').value = ''; document.getElementById('cancel-modal').style.display = 'flex'; }
    function closeCancelModal() { document.getElementById('cancel-modal').style.display = 'none'; }
    
    // FIX: Bulletproof Telegram Routing
    function submitCancelRequest() {
        const reason = document.getElementById('cancel-reason').value;
        const msg = `សួស្តី Admin, ខ្ញុំចង់ស្នើសុំបោះបង់ការកម្ម៉ង់លេខ #${currentCancelOrderId}។\nមូលហេតុ: ${reason ? reason : 'មិនបានបញ្ជាក់'}`;
        const encodedMsg = encodeURIComponent(msg);
        
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "") { 
            window.Telegram.WebApp.openTelegramLink(`https://t.me/+85587282827?text=${encodedMsg}`); 
        } else { 
            // Force external window context using window features
            const newWindow = window.open(`https://t.me/+85587282827?text=${encodedMsg}`, '_blank', 'noopener,noreferrer');
            if (newWindow) newWindow.opener = null;
        }
        closeCancelModal();
    }

    initPage();
</script>
</body>
</html>
