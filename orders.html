<!DOCTYPE html>
<html lang="km" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>បញ្ជីទិញរបស់ខ្ញុំ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pizz-green: #2ecc71; --pizz-red: #e74c3c; --pizz-dark: #2c3e50; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #000; margin: 0; padding: 0; display: flex; justify-content: center; }
        #app-shell { width: 100%; max-width: 480px; background: #f0f2f5; min-height: 100dvh; display: flex; flex-direction: column; position: relative; }
        .master-header { display: flex; align-items: center; justify-content: center; background: #fff; padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 200; font-weight: 700; font-size: 1.1rem; color: var(--pizz-dark); }
        .container { padding: 15px; padding-bottom: 90px; flex-grow: 1; overflow-y: auto; }
        
        .order-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .order-id { font-weight: 700; color: #2c3e50; font-size: 1rem; }
        .order-date { font-size: 0.75rem; color: #7f8c8d; }
        .status-badge { background: #fff3cd; color: #f39c12; padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: inline-block; }
        .status-badge.success { background: #e8f5e9; color: var(--pizz-green); }
        
        .order-total { font-size: 1.1rem; font-weight: 700; color: var(--pizz-red); margin: 15px 0; text-align: right; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-outline { flex: 1; border: 1px solid #ddd; background: #fff; color: #7f8c8d; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
        .btn-primary { flex: 1; border: none; background: var(--pizz-green); color: #fff; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
        .btn-danger { flex: 1; border: 1px solid var(--pizz-red); background: #fff; color: var(--pizz-red); padding: 10px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body class="notranslate">
<div id="app-shell">
    <div class="master-header">
        📦 បញ្ជីទិញរបស់ខ្ញុំ
    </div>

    <div class="container">
        <div style="font-size:0.85rem; color:#7f8c8d; margin-bottom:15px;">
            គណនី: <span id="account-phone" style="font-weight:700; color:var(--pizz-dark);">កំពុងទាញយក...</span>
        </div>

        <div class="order-card">
            <div class="order-header">
                <div>
                    <div class="order-id">ការកម្ម៉ង់ #10045</div>
                    <div class="order-date">ថ្ងៃទី 08 មេសា 2026, 14:30</div>
                </div>
                <div class="status-badge">⏳ កំពុងរៀបចំ</div>
            </div>
            <div style="font-size:0.85rem; color:#7f8c8d;">Cashew Nut x2, Mulberry Wine x1...</div>
            <div class="order-total">សរុប: 41,000៛</div>
            <div class="btn-group">
                <button class="btn-outline">មើលលម្អិត</button>
                <button class="btn-danger">បោះបង់</button>
            </div>
        </div>

        <div class="order-card">
            <div class="order-header">
                <div>
                    <div class="order-id">ការកម្ម៉ង់ #10022</div>
                    <div class="order-date">ថ្ងៃទី 05 មេសា 2026, 09:15</div>
                </div>
                <div class="status-badge success">✅ បានបញ្ជូនរួចរាល់</div>
            </div>
            <div style="font-size:0.85rem; color:#7f8c8d;">Mulberry Fruits x4...</div>
            <div class="order-total">សរុប: 120,000៛</div>
            <div class="btn-group">
                <button class="btn-outline">មើលលម្អិត</button>
                <button class="btn-primary">ទិញម្ដងទៀត</button>
            </div>
        </div>

    </div>

    <div id="bottom-nav-placeholder"></div>
</div>

<script src="nav.js"></script>
<script>
    loadBottomNav('orders');
    const phone = localStorage.getItem('pizz_user_phone');
    if(phone) { document.getElementById('account-phone').innerText = phone; } 
    else { document.getElementById('account-phone').innerText = "សូមធ្វើការកម្ម៉ង់សិន"; }
</script>
</body>
</html>
