        body { 
            font-family: 'Kantumruy Pro', sans-serif; background: #000; 
            margin: 0; padding: 0; display: flex; justify-content: center;
            color: var(--pizz-dark); overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        #app-shell {
            width: 100%; max-width: 480px; background: #f0f2f5; min-height: 100dvh;
            position: relative; box-shadow: 0 0 80px rgba(0,0,0,1); display: flex; flex-direction: column;
        }

        /* HEADER */
        .master-header { display: flex; align-items: center; background: #fff; padding: 8px 12px; border-bottom: 1px solid var(--pizz-border); position: sticky; top: 0; z-index: 200; gap: 8px; }
        .brand-logo-btn { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }

        .cat-slider { display: flex; overflow-x: auto; padding: 5px 0; gap: 15px; scrollbar-width: none; flex-grow: 1; }
        .cat-slider::-webkit-scrollbar { display: none; }
        
        .movie-btn-pro { background: black; border-radius: 12px; padding: 6px 12px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .movie-btn-pro span:first-child { font-size: 1.5rem; color: #fff; line-height: 1; }

        .cat-item { text-align: center; min-width: 55px; cursor: pointer; flex-shrink: 0; }
        .cat-icon { width: 40px; height: 40px; background: var(--pizz-gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; overflow: hidden; }
        .cat-icon img { width: 100%; height: 100%; object-fit: cover; }
        .cat-item.active .cat-icon { border-color: var(--pizz-green); background: #e8f5e9; }
        .cat-item span { font-size: 0.6rem; display: block; white-space: nowrap; color: #7f8c8d; margin-top: 3px; }

        /* PRODUCT GRID - STRICT SCOPE FIX */
        .container { flex-grow: 1; overflow-y: auto; padding: 10px; padding-bottom: 120px; } 
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #f0f0f0; height: 100%; }

        .title { font-size: 0.85rem; font-weight: 700; height: 38px; overflow: hidden; margin: 0 0 5px 0; line-height: 1.2; color: var(--pizz-dark); }
        .price { color: var(--pizz-red); font-weight: 700; font-size: 1rem; margin-bottom: 10px; }

        .cart-header { display: none; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        .cart-item-row { display: grid; grid-template-columns: 1fr 100px 40px; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f9f9f9; }

        .checkout-btn { background: var(--pizz-green); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .checkout-btn:disabled { background: #bdc3c7 !important; cursor: not-allowed; }

        /* TOAST - GREEN PILL */
        #toast { 
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); 
            background: var(--pizz-green); color: #fff; padding: 10px 20px;

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .loader-img { width: 90px; height: 90px; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .float-contact { position: fixed; bottom: 35px; right: calc(50% - 220px); width: 55px; height: 55px; background: #0088cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 150; box-shadow: 0 4px 15px rgba(0,136,204,0.4); }
        @media (max-width: 500px) { .float-contact { right: 20px; } }
        footer { text-align: center; padding: 20px 20px 120px 20px; font-size: 0.7rem; color: #95a5a6; border-top: 1px solid var(--pizz-border); margin-top: 20px; }
    </style>
</head>

<script>
    const tg = window.Telegram.WebApp;
    const RENDER_URL = "https://pizzaking-bot.onrender.com"; 
    const WC_BASE = "https://1.phsar.me/wp-json/wc/v3";
    const AUTH = "?consumer_key=ck_6a9c8caa18a2b0ab114ef90bb9e982d69521ec03&consumer_secret=cs_63c256e1b4eba0a65723f054159e55d2148c3c57";
    
    tg.expand(); tg.ready();
    let allProducts = [], cart = [], cardQtys = {}, productVariations = {}, variationSelections = {}, customerNote = "";

    const DELIVERY_CONFIG = {
      "siem_reap_keywords": ["siem reap", "សៀមរាប", "ខេត្តសៀមរាប"],
      "siem_reap_free_over_riel": 40000, "siem_reap_charge_riel": 3000,
      "other_location_threshold_riel": 80000, "other_location_charge_below_riel": 8000,
      "other_location_charge_over_or_equal_riel": 11000
    };

    function saveCartToStorage() { localStorage.setItem('pizz_king_cart_v36', JSON.stringify(cart)); }
    function saveFormData() {
        localStorage.setItem('pizz_king_tel', document.getElementById('user-phone').value);
        localStorage.setItem('pizz_king_loc', document.getElementById('user-loc').value);
        localStorage.setItem('pizz_king_name', document.getElementById('user-name').value);
        checkForm();
    }

    async function fetchData() {
        const C_PROD = "pizz_cache_prod_v2", C_VAR = "pizz_cache_var_v2", C_CAT = "pizz_cache_cat_v2", C_TIME = "pizz_cache_time_v2";
        const now = Date.now(), last = localStorage.getItem(C_TIME);
        
        if(last && (now - last < 86400000)) { 
            allProducts = JSON.parse(localStorage.getItem(C_PROD));
            productVariations = JSON.parse(localStorage.getItem(C_VAR));
            renderCategories(JSON.parse(localStorage.getItem(C_CAT)));
            renderProducts(allProducts); restoreState();
            document.getElementById('loader').style.display = 'none'; return;
        }

        try {
            const catRes = await fetch(`${WC_BASE}/products/categories${AUTH}&hide_empty=true&parent=0`);
            const cats = await catRes.json();
            renderCategories(cats);
            localStorage.setItem(C_CAT, JSON.stringify(cats));
            const prodRes = await fetch(`${WC_BASE}/products${AUTH}&per_page=100&status=publish`);
            allProducts = await prodRes.json();
            for (const vp of allProducts.filter(p => p.type === 'variable')) {
                const vRes = await fetch(`${WC_BASE}/products/${vp.id}/variations${AUTH}`);
                productVariations[vp.id] = await vRes.json();
            }
            localStorage.setItem(C_PROD, JSON.stringify(allProducts));
            localStorage.setItem(C_VAR, JSON.stringify(productVariations));
            localStorage.setItem(C_TIME, now);
            document.getElementById('loader').style.display = 'none';
            restoreState();
        } catch(e) { document.getElementById('loader').style.display = 'none'; }
    }

    function restoreState() {
        document.getElementById('user-phone').value = localStorage.getItem('pizz_king_tel') || "";
        document.getElementById('user-loc').value = localStorage.getItem('pizz_king_loc') || "";
        document.getElementById('user-name').value = localStorage.getItem('pizz_king_name') || "";
        const savedCart = localStorage.getItem('pizz_king_cart_v36');
        if(savedCart) cart = JSON.parse(savedCart);
        updateCartBasedOnDelivery(); checkForm();
        renderProducts(allProducts);
    }

    function renderProducts(items) {
        document.getElementById('product-grid').innerHTML = items.map(p => {
            const pid = p.id; cardQtys[pid] = 1;
            let variations = "";
            if (p.type === 'variable' && productVariations[pid]) {
                variations = `<div class="var-container">` + productVariations[pid].map(v => `<div class="var-chip" id="var-${pid}-${v.id}" onclick="selectVariation(${pid}, ${v.id})">${v.attributes[0].option}</div>`).join('') + `</div>`;
                if(productVariations[pid].length > 2) {
                    variations = `<select class="var-selector" onchange="selectVariationDropdown(${pid}, this)"><option value="">-- រើសប្រភេទ --</option>` + productVariations[pid].map(v => `<option value="${v.id}">${v.attributes[0].option}</option>`).join('') + `</select>`;
                }
            }
            return `<div class="card" id="card-${pid}">
                        <img src="${p.images[0]?.src || ''}" onclick="openDetail(${pid})">
                        <div class="card-body">
                            <div class="title" onclick="openDetail(${pid})">${p.name}</div>
                            <div class="price">${p.type === 'variable' ? 'ចាប់ពី ' : ''}${parseInt(p.price).toLocaleString()}៛</div>
                            ${variations}
                            <div class="qty-wrapper">
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="changeCardQty(${pid},-1)">−</button>
                                    <span id="q-${pid}" style="font-weight:bold;">1</span>
                                    <button class="qty-btn" onclick="changeCardQty(${pid},1)">+</button>
                                </div>
                                <button class="btn-add-cart" onclick="addToCart(${pid})">🛒 បន្ថែមក្នុងកន្ត្រក</button>
                            </div>
                        </div>
                    </div>`;
        }).join('');
    }

    function selectVariation(pid, vid) { variationSelections[pid] = vid; document.querySelectorAll(`#card-${pid} .var-chip`).forEach(c => c.classList.remove('active')); const chip = document.getElementById(`var-${pid}-${vid}`); if(chip) chip.classList.add('active'); }
    function selectVariationDropdown(pid, s) { variationSelections[pid] = s.value; }
    
    function addToCart(pid) {
        const p = allProducts.find(x => x.id === pid); const q = cardQtys[pid] || 1;
        let name = p.name, price = parseFloat(p.price), cid = pid.toString();
        if (p.type === 'variable') {
            const vid = variationSelections[pid]; if (!vid) { tg.showAlert("សូមរើសប្រភេទ!"); return; }
            const vData = productVariations[pid].find(v => v.id == vid);
            name = `${p.name} (${vData.attributes[0].option})`; price = parseFloat(vData.price); cid = `${pid}-${vid}`;
        }
        const existing = cart.find(i => i.cartId.toString() === cid.toString());
        if(existing) existing.qty += q; else cart.push({ cartId: cid, id: pid, name, price, qty: q });
        saveCartToStorage(); updateCartBasedOnDelivery();
        
        const t = document.getElementById('toast'); 
        t.style.display='flex'; 
        setTimeout(() => t.style.display='none', 2000);
    }

    function updateCartBasedOnDelivery() {
        const realItems = cart.filter(i => !i.cartId.toString().startsWith('delivery')); if(realItems.length === 0) { cart = []; updateUI([]); return; }
        const subtotal = realItems.reduce((s, i) => s + (i.price * i.qty), 0);
        const locRaw = document.getElementById('user-loc').value.toLowerCase(); cart = realItems;
        if(locRaw.length > 3) {
            const isSR = DELIVERY_CONFIG.siem_reap_keywords.some(k => locRaw.includes(k));
            let fee = isSR ? (subtotal < 40000 ? 3000 : 0) : (subtotal < 80000 ? 8000 : 11000);
            if(fee > 0) cart.push({ cartId: "delivery", id: "delivery", name: "ថ្លៃដឹកជញ្ជូន", price: fee, qty: 1 });
        }
        updateUI(cart);
    }

    function updateUI(itemsList) {
        const show = itemsList.length > 0; document.getElementById('footer-ui').style.display = show ? 'block' : 'none';
        const total = itemsList.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('cart-count').innerText = `🛒 កន្ត្រក: ${itemsList.filter(i => !i.cartId.toString().startsWith('delivery')).length} មុខ (មើលលម្អិត)`;
        document.getElementById('cart-total').innerText = `${total.toLocaleString()}៛`;
        document.getElementById('cart-list').innerHTML = itemsList.map(i => `<div class="cart-item-row"><div>${i.name}<br><small>${i.price.toLocaleString()}៛</small></div><div style="display:flex;align-items:center;justify-content:center;gap:10px;">${i.cartId.toString().startsWith('delivery') ? '' : `<button class="qty-btn" onclick="updateCartItemQty('${i.cartId}',-1)">−</button>`}<span>${i.qty}</span>${i.cartId.toString().startsWith('delivery') ? '' : `<button class="qty-btn" onclick="updateCartItemQty('${i.cartId}',1)">+</button>`}</div><button class="cart-del-btn" onclick="removeFromCart('${i.cartId}')"><svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:red;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button></div>`).join('');
        checkForm();
    }

    function checkForm() {
        const n = document.getElementById('user-name').value, p = document.getElementById('user-phone').value, l = document.getElementById('user-loc').value;
        const hasItems = cart.filter(i => !i.cartId.toString().startsWith('delivery')).length > 0;
        const btn = document.getElementById('pre-pay-btn'); 
        const isValid = (n.length > 1 && p.length > 8 && l.length > 3 && hasItems);
        btn.disabled = !isValid; 
        
        if(isValid) {
            btn.style.background = "#2ecc71";
            btn.innerText = "ទូទាត់ប្រាក់ឥឡូវនេះ"; 
        } else {
            btn.style.background = "#bdc3c7";
            btn.innerText = "ចាប់ផ្តើមបំពេញព័ត៌មានដឹកជញ្ជូន"; 
        }
    }

    function crc16(d) { let c = 0xFFFF; for (let i = 0; i < d.length; i++) { let x = ((c >> 8) ^ d.charCodeAt(i)) & 0xFF; x ^= x >> 4; c = ((c << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF; } return (c & 0xFFFF).toString(16).toUpperCase().padStart(4, '0'); }
    function generateDynamicABAQR(amt) {
        const prefix = "00020101021229450016abaakhppxxx@abaa01090872828270208ABA Bank40390006abaP2P0112864C75E859140209087282827520400005303116";
        const amtVal = amt.toString() + ".0";
        const payload = prefix + `54${(amtVal.length).toString().padStart(2, '0')}${amtVal}` + "5802KH5909SOUR DARA6010Phnom Penh";
        const tag99 = `99340013${Date.now()}0113${Date.now()+31536000000}`;
        const full = payload + tag99 + "6304";
        return full + crc16(full);
    }

    function openPayment() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('pay-amt-label').innerText = total.toLocaleString();
        
        document.getElementById('recap-list').innerHTML = cart.map(i => `<div class="recap-row"><span>${i.name} x${i.qty}</span><span>${(i.price * i.qty).toLocaleString()}៛</span></div>`).join('') + `<div style="border-top:2px solid #eee; margin-top:10px; padding-top:10px; display:flex; justify-content:space-between; font-weight:800;"><span>សរុប៖</span><span>${total.toLocaleString()}៛</span></div>`;
        
        document.getElementById('payment-screen').style.display = 'flex';
        const dynamicQR = generateDynamicABAQR(total);
        document.getElementById('dynamic-khqr').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(dynamicQR)}`;
        startTimer(900);
    }

    async function downloadQRImage() {
        const target = document.getElementById('invoice-card');
        const canvas = await html2canvas(target, { scale: 3, useCORS: true, logging: false });
        const link = document.createElement('a'); link.download = 'PizzKing_Receipt.png'; link.href = canvas.toDataURL("image/png"); link.click();
    }

    async function submitFinalOrder() {
        const btn = document.getElementById('confirm-btn'); btn.innerText = "⏳ កំពុងបញ្ជូន..."; btn.disabled = true;
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const orderData = { telegram_id: tg.initDataUnsafe.user?.id || 12345, name: document.getElementById('user-name').value, phone: document.getElementById('user-phone').value, location: document.getElementById('user-loc').value, items: cart, total, note: customerNote };
        try {
            await fetch(`${RENDER_URL}/create-order`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(orderData) });
            localStorage.removeItem('pizz_king_cart_v36'); tg.showAlert("ការកម្ម៉ង់ជោគជ័យ!", () => location.reload());
        } catch (e) { tg.showAlert("⚠️ Connection Error"); btn.innerText = "✅ ខ្ញុំបានបង់ប្រាក់រួចរាល់"; btn.disabled = false; }
    }

    function toggleRecap() {
        const list = document.getElementById('recap-list');
        const qrWrap = document.getElementById('qr-container');
        const caret = document.getElementById('recap-caret');

        if (list.style.display === 'block') {
            list.style.display = 'none';
            qrWrap.style.display = 'block';
            caret.innerText = '▼';
        } else {
            list.style.display = 'block';
            qrWrap.style.display = 'none';
            caret.innerText = '▲';
        }
    }

    function openDetail(pid) { 
        const p = allProducts.find(x => x.id === pid);
        document.getElementById('popup-content').innerHTML = `<img src="${p.images[0].src}" style="width:100%; max-height:200px; object-fit:contain; border-radius:12px; margin-bottom:15px;"><h3 style="margin:0 0 10px 0;">${p.name}</h3><div style="font-size:0.85rem;color:#7f8c8d;line-height:1.6;text-align:left;">${p.description || "គ្មានការពិពណ៌នា"}</div>`;
        document.getElementById('detail-popup').style.display = 'flex';
    }

    function openNote() { document.getElementById('note-input').value = customerNote; document.getElementById('note-modal').style.display = 'flex'; }
    function closeNote() { document.getElementById('note-modal').style.display = 'none'; }
    function saveNote() { customerNote = document.getElementById('note-input').value; document.getElementById('note-btn').innerText = "✅ ចំណាំ"; closeNote(); }
    function toggleCart() { document.getElementById('cart-list').classList.toggle('open'); document.getElementById('cart-header').classList.toggle('open'); }
    function closePay() { document.getElementById('payment-screen').style.display = 'none'; }
    function changeCardQty(pid, d) { cardQtys[pid] = Math.max(1, (cardQtys[pid] || 1) + d); document.getElementById(`q-${pid}`).innerText = cardQtys[pid]; }
    function renderCategories(cats) { cats.forEach(c => { document.getElementById('cat-slider').innerHTML += `<div class="cat-item" id="cat-${c.id}" onclick="filterCatLocal(${c.id})"><div class="cat-icon">${c.image ? `<img src="${c.image.src}">` : "📦"}</div><span>${c.name}</span></div>`; }); }
    function filterCatLocal(id) { document.querySelectorAll('.cat-item, .brand-logo-btn').forEach(el => el.classList.remove('active')); const el = id === 0 ? document.getElementById('cat-0') : document.getElementById(`cat-${id}`); if(el) el.classList.add('active'); renderProducts(id === 0 ? allProducts : allProducts.filter(p => p.categories.some(c => c.id === id))); }
    function updateCartItemQty(cid, d) { const i = cart.find(x => x.cartId.toString() === cid.toString()); if (i && !i.cartId.toString().startsWith('delivery')) { i.qty = Math.max(1, i.qty + d); updateCartBasedOnDelivery(); } }
    function removeFromCart(cid) { cart = cart.filter(x => x.cartId.toString() !== cid.toString()); updateCartBasedOnDelivery(); }
    function closeDetail() { document.getElementById('detail-popup').style.display = 'none'; }
    function startTimer(d) { let t = d; setInterval(() => { let m = parseInt(t/60,10), s = parseInt(t%60,10); document.getElementById('pay-timer').textContent = (m<10?"0"+m:m)+":"+(s<10?"0"+s:s); if(--t < 0) t=0; }, 1000); }

    fetchData();
</script>
</body>
