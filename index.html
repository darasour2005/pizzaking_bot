<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizz King Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg-color: #ffffff; --tg-theme-text-color: #222222; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: var(--tg-theme-bg-color); margin: 0; padding: 10px; color: var(--tg-theme-text-color); }
        /* 2-Column Grid Layout */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { border: 1px solid #eee; border-radius: 12px; overflow: hidden; background: #fff; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .info { padding: 8px; flex-grow: 1; }
        .price { color: #e74c3c; font-weight: bold; font-size: 1.1em; }
        .btn { background: #3498db; color: white; border: none; padding: 8px; border-radius: 6px; width: 100%; margin-top: 5px; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #2ecc71; color: white; padding: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <h2 style="text-align:center;">🇰🇭 Pizz King Store</h2>
        <div id="product-list" class="grid">
            <p style="text-align:center;">កំពុងទាញយកទំនិញ...</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Opens the app to full screen immediately

        async function fetchProducts() {
            const response = await fetch('https://1.phsar.me/wp-json/wc/v3/products?consumer_key=ck_6a9c8caa18a2b0ab114ef90bb9e982d69521ec03&consumer_secret=cs_63c256e1b4eba0a65723f054159e55d2148c3c57&per_page=20');
            const products = await response.json();
            const container = document.getElementById('product-list');
            container.innerHTML = '';

            products.forEach(p => {
                const img = p.images.length ? p.images[0].src : 'https://via.placeholder.com/150';
                container.innerHTML += `
                    <div class="card">
                        <img src="${img}">
                        <div class="info">
                            <div style="font-size:0.9em; height:40px; overflow:hidden;">${p.name}</div>
                            <div class="price">${p.price}៛</div>
                            <button class="btn" onclick="buyNow('${p.price}')">ទិញភ្លាមៗ</button>
                        </div>
                    </div>
                `;
            });
        }

        function buyNow(amount) {
            const merchantId = "alex@acleda";
            const payUrl = `https://link.bakong.nbc.gov.kh/pay?id=${merchantId}&amount=${amount}&currency=KHR`;
            tg.openLink(payUrl); // Opens ACLEDA/Bakong directly from the app
        }

        fetchProducts();
    </script>
</body>
</html>
