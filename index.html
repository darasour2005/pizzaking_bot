<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizz King Sovereign V6</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pizz-green: #2ecc71; --pizz-red: #e74c3c; --pizz-dark: #2c3e50; --pizz-gray: #f8f9fa; --pizz-border: #eeeeee; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: var(--pizz-dark); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .cat-slider { display: flex; overflow-x: auto; padding: 10px; background: #fff; gap: 15px; border-bottom: 1px solid var(--pizz-border); position: sticky; top: 0; z-index: 100; scrollbar-width: none; }
        .cat-slider::-webkit-scrollbar { display: none; }
        .cat-item { text-align: center; min-width: 55px; cursor: pointer; flex-shrink: 0; }
        .cat-icon { width: 45px; height: 45px; background: var(--pizz-gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 4px; border: 2px solid transparent; transition: 0.2s; overflow: hidden; }
        .cat-icon img { width: 100%; height: 100%; object-fit: cover; }
        .cat-item.active .cat-icon { border-color: var(--pizz-green); background: #e8f5e9; }
        .cat-item span { font-size: 0.65rem; font-weight: 700; display: block; white-space: nowrap; }

        .container { padding: 10px; padding-bottom: 220px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 130px; object-fit: cover; background: #eee; }
        .card-body { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.8rem; font-weight: 700; height: 35px; overflow: hidden; margin-bottom: 4px; line-height: 1.2; }
        .price { color: var(--pizz-red); font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; }
        
        .qty-control { display: flex; align-items: center; justify-content: space-between; background: var(--pizz-gray); border-radius: 6px; padding: 2px; margin-bottom: 8px; }
        .qty-btn { width: 25px; height: 25px; border: none; background: #fff; border-radius: 4px; font-weight: bold; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        .qty-num { font-size: 0.85rem; font-weight: 700; }

        .btn-add-cart { background: var(--pizz-green); color: #fff; border: none; width: 100%; height: 35px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-add-cart svg { width: 18px; height: 18px; fill: white; }

        .order-form { background: #fff; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid var(--pizz-border); }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.75rem; margin-bottom: 4px; font-weight: 700; color: #7f8c8d; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; }

        .footer-cart { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid var(--pizz-border); padding: 15px; box-sizing: border-box; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 200; border-radius: 20px 20px 0 0; }
        .cart-header { display: none; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cart-header.open { display: flex; }
        .cart-details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .cart-details.open { max-height: 300px; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid var(--pizz-border); padding-bottom: 10px; }
        
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cart-item-actions { display: flex; align-items: center; gap: 8px; }
        .cart-del-btn { color: var(--pizz-red); background: none; border: none; font-size: 18px; cursor: pointer; }

        .checkout-btn { background: var(--pizz-green); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }

        #loader { text-align: center; padding: 40px; color: #95a5a6; font-weight: 700; }
    </style>
</head>
<body>

<div class="cat-slider" id="cat-slider">
    <div class="cat-item active" id="cat-0" onclick="filterCatLocal(0)">
        <div class="cat-icon">🏠</div><span>ទាំងអស់</span>
    </div>
</div>

<div class="container">
    <div id="loader">📦 កំពុងទាញយក...</div>
    <div id="product-grid" class="grid"></div>
    
    <div class="order-form">
        <h4 style="margin:0 0 10px 0; font-size: 0.9rem;">📍 ព័ត៌មានដឹកជញ្ជូន</h4>
        <div class="input-group">
            <label>ឈ្មោះអ្នកទិញ</label>
            <input type="text" id="user-name" placeholder="ឈ្មោះក្នុង Telegram">
        </div>
        <div class="input-group">
            <label>លេខទូរស័ព្ទ</label>
            <input type="tel" id="user-phone" placeholder="បញ្ចូលលេខទូរស័ព្ទ">
        </div>
        <div class="input-group">
            <label>ទីតាំងដឹកជញ្ជូន</label>
            <input type="text" id="user-loc" placeholder="ផ្ទះលេខ, ផ្លូវ, ភូមិ, សង្កាត់...">
        </div>
    </div>
</div>

<div class="footer-cart" id="footer-ui" style="display:none;">
    <div class="cart-header" id="cart-header">
        <span style="font-weight: 700;">🛒 របស់ក្នុងកន្ត្រក</span>
        <button onclick="toggleCart()" style="background:none; border:none; font-size:24px; color:#95a5a6;">×</button>
    </div>
    <div id="cart-list" class="cart-details"></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-weight:700;" onclick="toggleCart()">
        <span id="cart-count">🛒 កន្ត្រក: ០ មុខ (មើលលម្អិត)</span>
        <span id="cart-total">០៛</span>
    </div>
    <button class="checkout-btn" onclick="submitOrder()">💳 បញ្ជាទិញឥឡូវនេះ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const WC_BASE = "https://1.phsar.me/wp-json/wc/v3";
    const AUTH = "?consumer_key=ck_6a9c8caa18a2b0ab114ef90bb9e982d69521ec03&consumer_secret=cs_63c256e1b4eba0a65723f054159e55d2148c3c57";

    tg.expand();
    tg.ready();

    let allProducts = []; 
    let cart = [];
    let cardQtys = {}; 

    // --- ១. ការទាញយកទិន្នន័យដំបូង ---
    async function init() {
        // Auto-fill Name from Telegram
        if (tg.initDataUnsafe.user) {
            document.getElementById('user-name').value = tg.initDataUnsafe.user.first_name + " " + (tg.initDataUnsafe.user.last_name || "");
        }
        
        // Auto-fill Phone/Loc from Browser Memory (if they ordered before)
        document.getElementById('user-phone').value = localStorage.getItem('pizz_phone') || "";
        document.getElementById('user-loc').value = localStorage.getItem('pizz_loc') || "";

        await loadCategories();
        await loadAllProducts();
    }

    async function loadCategories() {
        try {
            const res = await fetch(`${WC_BASE}/products/categories${AUTH}&hide_empty=true&parent=0`);
            const cats = await res.json();
            const slider = document.getElementById('cat-slider');
            cats.forEach(c => {
                slider.innerHTML += `
                    <div class="cat-item" id="cat-${c.id}" onclick="filterCatLocal(${c.id})">
                        <div class="cat-icon">${c.image ? `<img src="${c.image.src}">` : "📦"}</div>
                        <span>${c.name}</span>
                    </div>
                `;
            });
        } catch (e) { console.error("Cat Error"); }
    }

    async function loadAllProducts() {
        try {
            const res = await fetch(`${WC_BASE}/products${AUTH}&per_page=100&status=publish`);
            allProducts = await res.json();
            renderProducts(allProducts);
        } catch (e) { document.getElementById('loader').innerText = "⚠️ បញ្ហាការតភ្ជាប់"; }
    }

    function filterCatLocal(id) {
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`cat-${id}`).classList.add('active');
        const filtered = id === 0 ? allProducts : allProducts.filter(p => p.categories.some(c => c.id === id));
        renderProducts(filtered);
    }

    function renderProducts(items) {
        document.getElementById('loader').style.display = 'none';
        const grid = document.getElementById('product-grid');
        grid.innerHTML = items.map(p => {
            const pid = p.id;
            if(!cardQtys[pid]) cardQtys[pid] = 1;
            return `
                <div class="card">
                    <img src="${p.images[0]?.src || ''}">
                    <div class="card-body">
                        <div class="title">${p.name}</div>
                        <div class="price">${parseInt(p.price || 0).toLocaleString()}៛</div>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="changeCardQty(${pid}, -1)">−</button>
                            <span class="qty-num" id="card-qty-${pid}">${cardQtys[pid]}</span>
                            <button class="qty-btn" onclick="changeCardQty(${pid}, 1)">+</button>
                        </div>
                        <button class="btn-add-cart" onclick="addToCart(${pid})">
                            <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function changeCardQty(pid, delta) {
        cardQtys[pid] = Math.max(1, (cardQtys[pid] || 1) + delta);
        document.getElementById(`card-qty-${pid}`).innerText = cardQtys[pid];
    }

    function addToCart(id) {
        const p = allProducts.find(x => x.id === id);
        const qtyToAdd = cardQtys[id] || 1;
        const existing = cart.find(item => item.id === id);
        if (existing) { existing.qty += qtyToAdd; } 
        else { cart.push({ id: p.id, name: p.name, price: parseFloat(p.price || 0), qty: qtyToAdd }); }
        cardQtys[id] = 1;
        document.getElementById(`card-qty-${id}`).innerText = 1;
        updateUI();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function updateCartItemQty(id, delta) {
        const item = cart.find(i => i.id === id);
        if (item) { item.qty = Math.max(1, item.qty + delta); updateUI(); }
    }

    function removeFromCart(id) {
        cart = cart.filter(i => i.id !== id);
        if(cart.length === 0) toggleCart();
        updateUI();
    }

    function updateUI() {
        const footer = document.getElementById('footer-ui');
        footer.style.display = cart.length > 0 ? 'block' : 'none';
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('cart-count').innerText = `🛒 កន្ត្រក: ${cart.length} មុខ (ចុចមើល)`;
        document.getElementById('cart-total').innerText = `${total.toLocaleString()}៛`;
        document.getElementById('cart-list').innerHTML = cart.map(i => `
            <div class="cart-item-row">
                <div style="font-size:0.8rem; font-weight:700; flex-grow:1;">${i.name}<br><small>${i.price.toLocaleString()}៛</small></div>
                <div class="cart-item-actions">
                    <button class="qty-btn" onclick="updateCartItemQty(${i.id}, -1)">−</button>
                    <span>${i.qty}</span>
                    <button class="qty-btn" onclick="updateCartItemQty(${i.id}, 1)">+</button>
                    <button class="cart-del-btn" onclick="removeFromCart(${i.id})">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function toggleCart() {
        document.getElementById('cart-list').classList.toggle('open');
        document.getElementById('cart-header').classList.toggle('open');
    }

    async function submitOrder() {
        const name = document.getElementById('user-name').value;
        const phone = document.getElementById('user-phone').value;
        const loc = document.getElementById('user-loc').value;

        if (!phone || !loc || cart.length === 0) { tg.showAlert("សូមបំពេញព័ត៌មានឱ្យបានគ្រប់គ្រាន់!"); return; }

        // Save to browser memory for next time
        localStorage.setItem('pizz_phone', phone);
        localStorage.setItem('pizz_loc', loc);

        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const telegramId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

        tg.MainButton.setText("កំពុងបញ្ជូន...").show();
        
        try {
            await fetch("https://pizzaking-bot.onrender.com/create-order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ telegram_id: telegramId, name, phone, location: loc, items: cart, total })
            });
            tg.MainButton.hide();
            
            // Deep Link to Bank after order is saved
            const payUrl = `https://link.bakong.nbc.gov.kh/pay?id=${encodeURIComponent("alex@acleda")}&amount=${total}&currency=KHR&name=${encodeURIComponent("PizzKing")}`;
            tg.openLink(payUrl);
            
            tg.showConfirm("ការកម្ម៉ង់បានជោគជ័យ! បន្ទាប់ពីបង់ប្រាក់រួច សូមផ្ញើវិក្កយបត្រ (Screenshot) មកកាន់ពួកយើង។", () => tg.close());
        } catch (e) { tg.MainButton.hide(); tg.showAlert("Error!"); }
    }

    init();
</script>
</body>
</html>
