<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizz King Sovereign V9</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pizz-green: #2ecc71; --pizz-red: #e74c3c; --pizz-dark: #2c3e50; --pizz-gray: #f8f9fa; --pizz-border: #eeeeee; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: var(--pizz-dark); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Category Slider */
        .cat-slider { display: flex; overflow-x: auto; padding: 10px; background: #fff; gap: 15px; border-bottom: 1px solid var(--pizz-border); position: sticky; top: 0; z-index: 100; scrollbar-width: none; }
        .cat-slider::-webkit-scrollbar { display: none; }
        .cat-item { text-align: center; min-width: 55px; cursor: pointer; flex-shrink: 0; }
        .cat-icon { width: 45px; height: 45px; background: var(--pizz-gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 4px; border: 2px solid transparent; transition: 0.2s; overflow: hidden; }
        .cat-icon img { width: 100%; height: 100%; object-fit: cover; }
        .cat-item.active .cat-icon { border-color: var(--pizz-green); background: #e8f5e9; }
        .cat-item span { font-size: 0.65rem; font-weight: 700; display: block; }

        .container { padding: 10px; padding-bottom: 220px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 130px; object-fit: cover; background: #eee; }
        .card-body { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.8rem; font-weight: 700; height: 35px; overflow: hidden; margin-bottom: 4px; line-height: 1.2; }
        .price { color: var(--pizz-red); font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; }
        
        .qty-control { display: flex; align-items: center; justify-content: space-between; background: var(--pizz-gray); border-radius: 6px; padding: 2px; margin-bottom: 8px; }
        .qty-btn { width: 25px; height: 25px; border: none; background: #fff; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .qty-num { font-size: 0.85rem; font-weight: 700; }
        .btn-add-cart { background: var(--pizz-green); color: #fff; border: none; width: 100%; height: 35px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-add-cart svg { width: 18px; height: 18px; fill: white; }

        .order-form { background: #fff; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid var(--pizz-border); }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.75rem; margin-bottom: 4px; font-weight: 700; color: #7f8c8d; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; }

        .footer-cart { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid var(--pizz-border); padding: 15px; box-sizing: border-box; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 200; border-radius: 20px 20px 0 0; }
        .cart-header { display: none; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cart-header.open { display: flex; }
        .cart-details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .cart-details.open { max-height: 300px; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid var(--pizz-border); padding-bottom: 10px; }
        
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .cart-item-actions { display: flex; align-items: center; gap: 8px; }
        .cart-del-btn { color: var(--pizz-red); background: none; border: none; font-size: 20px; cursor: pointer; }

        .checkout-btn { background: var(--pizz-green); color: #fff; border: none; width: 100%; padding: 20px; border-radius: 12px; font-weight: 700; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.4); }

        /* Payment Overlay V9 */
        .pay-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .qr-image { width: 220px; height: 220px; margin-bottom: 20px; }
        .bank-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; }
        .bank-btn { background: #f8f9fa; border: 2px solid #eee; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; cursor: pointer; }
        .bank-btn.primary { background: var(--pizz-green); color: white; border-color: var(--pizz-green); }
        
        #loader { text-align: center; padding: 40px; color: #95a5a6; font-weight: 700; }
    </style>
</head>
<body>

<div id="payment-screen" class="pay-overlay">
    <h3 style="margin-top:0;">💳 ការបង់ប្រាក់តាម KHQR</h3>
    <div style="color: var(--pizz-red); font-weight: 700; margin-bottom: 10px;" id="pay-timer">05:00</div>
    
    <img src="" id="qr-display" class="qr-image">
    
    <div style="text-align:center; margin-bottom: 20px;">
        <span style="font-size: 1.2rem; font-weight: 700;">សរុប: <span id="pay-amt">0</span>៛</span>
    </div>

    <div class="bank-grid">
        <button class="bank-btn primary" onclick="triggerBankPay()">
            📱 បើកកម្មវិធីធនាគារដើម្បីបង់ប្រាក់
        </button>
        <button class="bank-btn" onclick="finalOrder()">
            ✅ ខ្ញុំបានបង់រួចរាល់ (រួចរាល់)
        </button>
    </div>
    
    <button onclick="closePay()" style="background:none; border:none; margin-top:20px; color:#95a5a6;">ត្រឡប់ក្រោយ</button>
</div>

<div class="cat-slider" id="cat-slider">
    <div class="cat-item active" id="cat-0" onclick="filterCatLocal(0)"><div class="cat-icon">🏠</div><span>ទាំងអស់</span></div>
</div>

<div class="container">
    <div id="loader">📦 កំពុងទាញយក...</div>
    <div id="product-grid" class="grid"></div>
    
    <div class="order-form">
        <h4 style="margin:0 0 10px 0; font-size: 0.9rem;">📍 ព័ត៌មានដឹកជញ្ជូន</h4>
        <div class="input-group"><label>ឈ្មោះ</label><input type="text" id="user-name"></div>
        <div class="input-group"><label>លេខទូរស័ព្ទ</label><input type="tel" id="user-phone"></div>
        <div class="input-group"><label>ទីតាំង</label><input type="text" id="user-loc"></div>
    </div>
</div>

<div class="footer-cart" id="footer-ui" style="display:none;">
    <div class="cart-header" id="cart-header"><span>🛒 ទំនិញដែលបានរើស</span><button onclick="toggleCart()" style="background:none; border:none; font-size:24px;">×</button></div>
    <div id="cart-list" class="cart-details"></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-weight:700;" onclick="toggleCart()">
        <span id="cart-count">🛒 កន្ត្រក: ០ មុខ</span><span id="cart-total">០៛</span>
    </div>
    <button class="checkout-btn" onclick="openPayment()">💳 បង់ប្រាក់ឥឡូវនេះ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const WC_BASE = "https://1.phsar.me/wp-json/wc/v3";
    const AUTH = "?consumer_key=ck_6a9c8caa18a2b0ab114ef90bb9e982d69521ec03&consumer_secret=cs_63c256e1b4eba0a65723f054159e55d2148c3c57";
    const MERCHANT_ID = "087282827@acleda"; // SOUR DARA ACLEDA

    tg.expand();

    let allProducts = [], cart = [], cardQtys = {};

    async function init() {
        if(tg.initDataUnsafe.user) document.getElementById('user-name').value = tg.initDataUnsafe.user.first_name;
        document.getElementById('user-phone').value = localStorage.getItem('pizz_phone') || "";
        document.getElementById('user-loc').value = localStorage.getItem('pizz_loc') || "";
        await loadCategories();
        await loadAllProducts();
    }

    async function loadCategories() {
        const res = await fetch(`${WC_BASE}/products/categories${AUTH}&hide_empty=true&parent=0`);
        const cats = await res.json();
        cats.forEach(c => {
            document.getElementById('cat-slider').innerHTML += `<div class="cat-item" id="cat-${c.id}" onclick="filterCatLocal(${c.id})"><div class="cat-icon">${c.image ? `<img src="${c.image.src}">` : "📦"}</div><span>${c.name}</span></div>`;
        });
    }

    async function loadAllProducts() {
        const res = await fetch(`${WC_BASE}/products${AUTH}&per_page=100&status=publish`);
        allProducts = await res.json();
        renderProducts(allProducts);
    }

    function renderProducts(items) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('product-grid').innerHTML = items.map(p => {
            const pid = p.id; if(!cardQtys[pid]) cardQtys[pid] = 1;
            return `<div class="card"><img src="${p.images[0]?.src || ''}"><div class="card-body"><div class="title">${p.name}</div><div class="price">${parseInt(p.price).toLocaleString()}៛</div><div class="qty-control"><button class="qty-btn" onclick="changeCardQty(${pid},-1)">−</button><span id="card-qty-${pid}">${cardQtys[pid]}</span><button class="qty-btn" onclick="changeCardQty(${pid},1)">+</button></div><button class="btn-add-cart" onclick="addToCart(${pid})"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg></button></div></div>`;
        }).join('');
    }

    function changeCardQty(pid, d) { cardQtys[pid] = Math.max(1, (cardQtys[pid] || 1) + d); document.getElementById(`card-qty-${pid}`).innerText = cardQtys[pid]; }

    function addToCart(id) {
        const p = allProducts.find(x => x.id === id);
        const q = cardQtys[id];
        const ex = cart.find(i => i.id === id);
        if(ex) ex.qty += q; else cart.push({ id: p.id, name: p.name, price: parseFloat(p.price), qty: q });
        cardQtys[id] = 1; document.getElementById(`card-qty-${id}`).innerText = 1;
        updateUI(); tg.HapticFeedback.impactOccurred('medium');
    }

    function updateCartItemQty(id, d) { const i = cart.find(x => x.id === id); if(i) { i.qty = Math.max(1, i.qty + d); updateUI(); } }
    function removeFromCart(id) { cart = cart.filter(x => x.id !== id); if(!cart.length) toggleCart(); updateUI(); }

    function updateUI() {
        document.getElementById('footer-ui').style.display = cart.length > 0 ? 'block' : 'none';
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('cart-count').innerText = `🛒 កន្ត្រក: ${cart.length} មុខ (មើលលម្អិត)`;
        document.getElementById('cart-total').innerText = `${total.toLocaleString()}៛`;
        document.getElementById('cart-list').innerHTML = cart.map(i => `<div class="cart-item-row"><div class="cart-item-info">${i.name}<br><small>${i.price.toLocaleString()}៛</small></div><div class="cart-item-actions"><button class="qty-btn" onclick="updateCartItemQty(${i.id},-1)">−</button><span>${i.qty}</span><button class="qty-btn" onclick="updateCartItemQty(${i.id},1)">+</button><button class="cart-del-btn" onclick="removeFromCart(${i.id})">🗑️</button></div></div>`).join('');
    }

    function openPayment() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('pay-amt').innerText = total.toLocaleString();
        document.getElementById('payment-screen').style.display = 'flex';
        
        // Show the ACLEDA KHQR IMAGE directly from your photo source or generated properly
        const khqrData = `https://link.bakong.nbc.gov.kh/pay?id=${MERCHANT_ID}&amount=${total}&currency=KHR&name=PizzKing`;
        document.getElementById('qr-display').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(khqrData)}`;
        
        startTimer(300);
    }

    function triggerBankPay() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const payUrl = `https://link.bakong.nbc.gov.kh/pay?id=${MERCHANT_ID}&amount=${total}&currency=KHR&name=PizzKing`;
        tg.openLink(payUrl); // This triggers ACLEDA app on the phone
    }

    async function finalOrder() {
        const phone = document.getElementById('user-phone').value;
        const loc = document.getElementById('user-loc').value;
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        
        localStorage.setItem('pizz_phone', phone);
        localStorage.setItem('pizz_loc', loc);

        const orderData = { telegram_id: tg.initDataUnsafe.user?.id, name: document.getElementById('user-name').value, phone, location: loc, items: cart, total };
        
        await fetch("https://pizzaking-bot.onrender.com/create-order", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(orderData) });
        tg.close();
    }

    function startTimer(duration) {
        let timer = duration, min, sec;
        const display = document.getElementById('pay-timer');
        setInterval(() => {
            min = parseInt(timer / 60, 10); sec = parseInt(timer % 60, 10);
            display.textContent = (min < 10 ? "0" + min : min) + ":" + (sec < 10 ? "0" + sec : sec);
            if (--timer < 0) timer = 0;
        }, 1000);
    }

    function toggleCart() { document.getElementById('cart-list').classList.toggle('open'); document.getElementById('cart-header').classList.toggle('open'); }
    function closePay() { document.getElementById('payment-screen').style.display = 'none'; }
    function filterCatLocal(id) { renderProducts(id === 0 ? allProducts : allProducts.filter(p => p.categories.some(c => c.id === id))); }

    init();
</script>
</body>
</html>
