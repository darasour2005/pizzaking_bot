<!DOCTYPE html>
<html lang="km" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pizza King Store V2.1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Slider Styles */
        .main-slider { width: 100%; height: 160px; overflow: hidden; position: relative; border-radius: 12px; margin: 10px 0; }
        .slider-track { display: flex; transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); height: 100%; }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slider-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        .dot.active { background: #fff; width: 16px; border-radius: 4px; }

        /* Mini Cart Bloc Styles */
        .summary-bloc { background: #fff; padding: 12px; border-top: 1px solid #eee; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .summary-top { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 700; cursor: pointer; }
        .summary-actions { display: flex; gap: 10px; }
        .shipping-trigger-btn { flex: 1; background: #f0f2f5; border: 1px dashed #ccc; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 0.85rem; }
        .checkout-btn { flex: 1; border-radius: 10px; border: none; font-weight: 700; color: #fff; transition: 0.3s; }
        .mini-btn { background: #f0f2f5; border: none; border-radius: 8px; padding: 5px 10px; font-weight: 700; cursor: pointer; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; color: #7f8c8d; margin-bottom: 5px; font-weight: 700; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body class="notranslate">

<div id="loader"><img src="logo.png" class="loader-img"></div>

<div id="app-shell">
    <div class="master-header index-header">
        <img src="logo.png" class="brand-logo-btn active" id="cat-0" onclick="filterCatLocal(0)">
        <div class="cat-slider" id="cat-slider"></div>
        <a href="movie.html" class="movie-btn-pro">🎬</a>
    </div>

    <div class="container">
        <div id="slider-container"></div>

        <div id="product-grid" class="grid"></div>
    </div>

    <div id="footer-ui-container"></div>

    <div id="payment-screen" class="pay-overlay">... (Exact logic from V2.0) ...</div>
    <div id="note-modal" class="modal-overlay">... (Exact logic from V2.0) ...</div>
    <div id="success-modal" class="modal-overlay">... (Exact logic from V2.0) ...</div>
    <div id="detail-popup" class="popup-screen" onclick="closeDetail()">... (Exact logic from V2.0) ...</div>
    
    <div id="bottom-nav-placeholder"></div>
</div>

<script src="config.js"></script>
<script src="nav.js"></script>
<script src="slider.js"></script>
<script src="mini-cart.js"></script>
<script src="aba-qr.js"></script>

<script>
    loadBottomNav('home');
    initSlider();
    renderMiniCart();

    const tg = window.Telegram.WebApp;
    tg.expand(); tg.ready();
    
    let allProducts = [], cart = [], cardQtys = {}, productVariations = {}, variationSelections = {}, customerNote = "";

    function saveFormData() { 
        const nameInput = document.getElementById('user-name');
        const phoneInput = document.getElementById('user-phone');
        const locInput = document.getElementById('user-loc');
        
        if(nameInput) localStorage.setItem('pizz_king_name', nameInput.value); 
        if(phoneInput) localStorage.setItem('pizz_king_tel', phoneInput.value); 
        if(locInput) localStorage.setItem('pizz_king_loc', locInput.value); 
        
        updateCartBasedOnDelivery();
        checkForm(); 
    }

    // Logic for updating the Shipping Icon in the mini bar
    function checkForm() {
        const name = localStorage.getItem('pizz_king_name') || "";
        const phone = localStorage.getItem('pizz_king_tel') || "";
        const loc = localStorage.getItem('pizz_king_loc') || "";
        
        const isShippingValid = (name.length > 1 && phone.length > 8 && loc.length > 3);
        const icon = document.getElementById('shipping-status-icon');
        if(icon) icon.innerText = isShippingValid ? "✅" : "❌";

        const btn = document.getElementById('pre-pay-btn'); 
        const hasItems = cart.filter(i => !i.cartId.toString().startsWith('delivery')).length > 0;
        const isValid = isShippingValid && hasItems;
        
        if(btn) {
            btn.disabled = !isValid;
            btn.style.background = isValid ? "#2ecc71" : "#bdc3c7";
        }
    }

    // (Remaining fetchData, restoreState, renderProducts, addToCart logic exactly as before)
    // CRITICAL: Ensure updateUI is updated to point to the new footer-ui-container elements
    function updateUI(itemsList) {
        const show = itemsList.length > 0; 
        const footer = document.getElementById('footer-ui');
        if(footer) footer.style.display = show ? 'block' : 'none';

        const total = itemsList.reduce((s, i) => s + (i.price * i.qty), 0);
        const countLabel = document.getElementById('cart-count');
        const totalLabel = document.getElementById('cart-total');
        
        if(countLabel) countLabel.innerText = `🛒 កន្ត្រក: ${itemsList.filter(i => !i.cartId.toString().startsWith('delivery')).length} មុខ`;
        if(totalLabel) totalLabel.innerText = `${total.toLocaleString()}៛`;
        
        const cartList = document.getElementById('cart-list');
        if(cartList) cartList.innerHTML = itemsList.map(i => `<div class="cart-item-row">...</div>`).join('');
        checkForm();
    }

    fetchData();
</script>
</body>
</html>
