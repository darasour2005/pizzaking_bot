<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizz King Sovereign</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pizz-green: #2ecc71; --pizz-red: #e74c3c; --pizz-dark: #2c3e50; --pizz-gray: #f8f9fa; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: var(--pizz-dark); }
        
        /* Category Slider */
        .cat-slider { display: flex; overflow-x: auto; padding: 15px; background: #fff; gap: 20px; border-bottom: 1px solid #eee; sticky; top: 0; z-index: 100; }
        .cat-item { text-align: center; min-width: 60px; cursor: pointer; }
        .cat-icon { width: 50px; height: 50px; background: var(--pizz-gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 5px; border: 2px solid transparent; }
        .cat-item.active .cat-icon { border-color: var(--pizz-green); background: #e8f5e9; }
        .cat-item span { font-size: 0.75rem; font-weight: 700; }

        /* Grid */
        .container { padding: 10px; padding-bottom: 180px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card-body { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.85rem; font-weight: 700; height: 38px; overflow: hidden; margin-bottom: 4px; }
        .price { color: var(--pizz-red); font-weight: 700; font-size: 0.95rem; }
        
        /* Cart Action */
        .action-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .btn-cart { background: var(--pizz-green); color: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        /* Order Form */
        .order-form { background: #fff; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 4px; font-weight: 700; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        /* Expandable Footer */
        .footer-cart { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 15px; box-sizing: border-box; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 200; }
        .cart-details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; font-size: 0.85rem; }
        .cart-details.open { max-height: 200px; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .checkout-btn { background: var(--pizz-green); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        
        /* Variations Modal placeholder */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; z-index: 300; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; border-radius: 15px; padding: 20px; }
    </style>
</head>
<body>

<div class="cat-slider" id="cat-slider">
    <div class="cat-item active" onclick="filterCat('all')"><div class="cat-icon">🏠</div><span>ទាំងអស់</span></div>
    <div class="cat-item" onclick="filterCat('fruits')"><div class="cat-icon">🍎</div><span>ផ្លែឈើ</span></div>
    <div class="cat-item" onclick="filterCat('dried')"><div class="cat-icon">🍇</div><span>ដំណាប់</span></div>
    <div class="cat-item" onclick="filterCat('drink')"><div class="cat-icon">🥤</div><span>ភេសជ្ជៈ</span></div>
</div>

<div class="container">
    <div id="product-grid" class="grid"></div>
    
    <div class="order-form">
        <h4 style="margin:0 0 10px 0;">📍 ព័ត៌មានដឹកជញ្ជូន</h4>
        <div class="input-group">
            <label>លេខទូរស័ព្ទ</label>
            <input type="tel" id="user-phone" placeholder="012 345 678">
        </div>
        <div class="input-group">
            <label>ទីតាំងដឹកជញ្ជូន</label>
            <input type="text" id="user-loc" placeholder="ផ្ទះលេខ, ភូមិ, សង្កាត់...">
        </div>
    </div>
</div>

<div class="footer-cart">
    <div id="cart-list" class="cart-details"></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:700;" onclick="toggleCart()">
        <span id="cart-count">🛒 កន្ត្រក: ០ មុខ (មើលលម្អិត)</span>
        <span id="cart-total">០៛</span>
    </div>
    <button class="checkout-btn" onclick="submitOrder()">💳 បញ្ជាទិញឥឡូវនេះ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let products = [];
    let cart = [];

    async function loadData() {
        // Fetch products from your WooCommerce
        const res = await fetch("https://1.phsar.me/wp-json/wc/v3/products?consumer_key=ck_6a9c8caa18a2b0ab114ef90bb9e982d69521ec03&consumer_secret=cs_63c256e1b4eba0a65723f054159e55d2148c3c57&per_page=50");
        products = await res.json();
        renderProducts(products);
    }

    function renderProducts(items) {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = items.map(p => `
            <div class="card">
                <img src="${p.images[0]?.src || ''}">
                <div class="card-body">
                    <div class="title">${p.name}</div>
                    <div class="price">${p.price}៛</div>
                    <div class="action-row">
                        <span>Qty: 1</span>
                        <button class="btn-cart" onclick="addToCart(${p.id})">🛒</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        cart.push({ id: p.id, name: p.name, price: parseFloat(p.price), qty: 1 });
        updateUI();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function updateUI() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('cart-count').innerText = `🛒 កន្ត្រក: ${cart.length} មុខ (ចុចមើល)`;
        document.getElementById('cart-total').innerText = `${total}៛`;
        
        document.getElementById('cart-list').innerHTML = cart.map(i => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${i.name} x${i.qty}</span>
                <span>${i.price * i.qty}៛</span>
            </div>
        `).join('');
    }

    function toggleCart() {
        document.getElementById('cart-list').classList.toggle('open');
    }

    async function submitOrder() {
        const phone = document.getElementById('user-phone').value;
        const loc = document.getElementById('user-loc').value;

        if (!phone || !loc || cart.length === 0) {
            alert("សូមបំពេញព័ត៌មាន និងជ្រើសរើសទំនិញ!");
            return;
        }

        // SEND TO YOUR RENDER SERVER
        const orderData = {
            phone: phone,
            location: loc,
            items: cart,
            total: cart.reduce((s, i) => s + (i.price * i.qty), 0)
        };

        tg.MainButton.showProgress();
        
        // This sends the order to main.py to save in WooCommerce
        await fetch("https://pizzaking-bot.onrender.com/create-order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(orderData)
        });

        tg.MainButton.hideProgress();
        alert("ការបញ្ជាទិញបានជោគជ័យ! យើងនឹងទាក់ទងទៅលោកអ្នក។");
        tg.close();
    }

    loadData();
</script>
</body>
</html>
