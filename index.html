<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizz King Sovereign V18</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pizz-green: #2ecc71; --pizz-red: #e74c3c; --pizz-dark: #2c3e50; --pizz-gray: #f8f9fa; --pizz-border: #eeeeee; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: var(--pizz-dark); overflow-x: hidden; }
        
        /* UI Grid & Cards */
        .container { padding: 10px; padding-bottom: 220px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        .card-body { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 0.8rem; font-weight: 700; height: 35px; overflow: hidden; margin-bottom: 4px; line-height: 1.2; }
        .price { color: var(--pizz-red); font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; }
        
        .qty-control { display: flex; align-items: center; justify-content: space-between; background: var(--pizz-gray); border-radius: 6px; padding: 2px; margin-bottom: 8px; }
        .qty-btn { width: 25px; height: 25px; border: none; background: #fff; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .qty-num { font-size: 0.85rem; font-weight: 700; }
        .btn-add-cart { background: var(--pizz-green); color: #fff; border: none; width: 100%; height: 35px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Form */
        .order-form { background: #fff; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid var(--pizz-border); }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.75rem; margin-bottom: 4px; font-weight: 700; color: #7f8c8d; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }

        /* Footer & Payment Overlay */
        .footer-cart { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid var(--pizz-border); padding: 15px; box-sizing: border-box; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 200; border-radius: 20px 20px 0 0; }
        .checkout-btn { background: var(--pizz-green); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
        .pay-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 300; display: none; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .qr-frame { border: 6px solid var(--pizz-green); border-radius: 12px; padding: 10px; margin-bottom: 15px; background: #fff; width: 220px; text-align: center; }
        .qr-img { width: 100%; height: auto; }
        .bank-btn { background: #007bff; color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-bottom: 15px; }
        #loader { text-align: center; padding: 40px; color: #95a5a6; font-weight: 700; }
    </style>
</head>
<body>

<div id="payment-screen" class="pay-overlay">
    <h3 style="margin-top:0;">💳 ការទូទាត់ប្រាក់ (មិនផុតកំណត់)</h3>
    <div style="color: var(--pizz-red); font-weight: 700; font-size: 1.4rem; margin-bottom: 10px;" id="pay-timer">15:00</div>
    <button class="bank-btn" onclick="triggerBankPay()">📱 បើកកម្មវិធី ABA ដើម្បីបង់ប្រាក់</button>
    <div class="qr-frame"><img src="" id="dynamic-khqr" class="qr-img"></div>
    <div style="text-align:center; margin-bottom: 15px;"><span style="font-size: 1.2rem; font-weight: 700;">សរុប: <span id="pay-amt">0</span>៛</span></div>
    <button class="checkout-btn" id="confirm-btn" onclick="submitFinalOrder()">✅ ខ្ញុំបានបង់ប្រាក់រួចរាល់</button>
    <button onclick="closePay()" style="background:none; border:none; margin-top:20px; color:#95a5a6;">ត្រឡប់ក្រោយ</button>
</div>

<div class="container">
    <div id="loader">📦 កំពុងទាញយកទំនិញ...</div>
    <div id="product-grid" class="grid"></div>
    <div class="order-form">
        <h4 style="margin:0 0 10px 0; font-size: 0.9rem;">📍 ព័ត៌មានដឹកជញ្ជូន</h4>
        <div class="input-group"><label>ឈ្មោះ</label><input type="text" id="user-name" oninput="checkForm()"></div>
        <div class="input-group"><label>លេខទូរស័ព្ទ</label><input type="tel" id="user-phone" oninput="checkForm()"></div>
        <div class="input-group"><label>ទីតាំង</label><input type="text" id="user-loc" oninput="checkForm()"></div>
    </div>
</div>

<div class="footer-cart" id="footer-ui" style="display:none;">
    <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-weight:700;">
        <span id="cart-count">🛒 កន្ត្រក: ០ មុខ</span><span id="cart-total">០៛</span>
    </div>
    <button class="checkout-btn" id="pre-pay-btn" onclick="openPayment()" disabled style="background:#bdc3c7;">បំពេញព័ត៌មានដើម្បីបង់ប្រាក់</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const RENDER_URL = "https://pizzaking-bot.onrender.com"; 
    const WC_BASE = "https://1.phsar.me/wp-json/wc/v3";
    const AUTH = "?consumer_key=ck_6a9c8caa18a2b0ab114ef90bb9e982d69521ec03&consumer_secret=cs_63c256e1b4eba0a65723f054159e55d2148c3c57";

    tg.expand();
    tg.ready();

    let allProducts = [], cart = [], cardQtys = {};

    // --- 🏦 CRC16 CHECKSUM ENGINE ---
    function crc16(data) {
        let crc = 0xFFFF;
        for (let i = 0; i < data.length; i++) {
            let x = ((crc >> 8) ^ data.charCodeAt(i)) & 0xFF;
            x ^= x >> 4;
            crc = ((crc << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF;
        }
        return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
    }

    function generateSovereignKHQR(amount) {
        const amtStr = amount.toFixed(1);
        const amtPart = `54${amtStr.length.toString().padStart(2, '0')}${amtStr}`;
        
        // FOUNDATION: Using your Valid Zero Balance string but adding the Amount Tag
        // Tag 01 is '11' (Static) to prevent expiration.
        const base = `00020101021129450016abaakhppxxx@abaa01090872828270208ABA Bank40390006abaP2P0112864C75E859140209087282827520400005303116${amtPart}5802KH5909SOUR DARA6010Phnom Penh6304`;
        
        return base + crc16(base);
    }

    function openPayment() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('pay-amt').innerText = total.toLocaleString();
        document.getElementById('payment-screen').style.display = 'flex';
        
        const finalQR = generateSovereignKHQR(total);
        document.getElementById('dynamic-khqr').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(finalQR)}`;
        startTimer(900);
    }

    function triggerBankPay() {
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const finalQR = generateSovereignKHQR(total);
        // Deep link using the raw KHQR string is the most reliable for mobile
        tg.openLink(`https://link.bakong.nbc.gov.kh/pay?id=087282827@acleda&amount=${total}&currency=KHR&name=SOUR%20DARA`);
    }

    // --- (Rest of the Immutable Logics for Cart & Form) ---
    async function init() {
        if(tg.initDataUnsafe.user) document.getElementById('user-name').value = tg.initDataUnsafe.user.first_name;
        document.getElementById('user-phone').value = localStorage.getItem('pizz_phone') || "";
        document.getElementById('user-loc').value = localStorage.getItem('pizz_loc') || "";
        checkForm(); await loadProducts();
    }
    function checkForm() {
        const n = document.getElementById('user-name').value, p = document.getElementById('user-phone').value, l = document.getElementById('user-loc').value;
        const btn = document.getElementById('pre-pay-btn');
        if(n.length > 1 && p.length > 8 && l.length > 5) { btn.disabled = false; btn.style.background = "#2ecc71"; btn.innerText = "💳 បន្តទៅការបង់ប្រាក់"; }
        else { btn.disabled = true; btn.style.background = "#bdc3c7"; }
    }
    async function loadProducts() {
        const res = await fetch(`${WC_BASE}/products${AUTH}&per_page=100&status=publish`);
        allProducts = await res.json();
        document.getElementById('loader').style.display = 'none';
        document.getElementById('product-grid').innerHTML = allProducts.map(p => {
            const pid = p.id; cardQtys[pid] = 1;
            return `<div class="card"><img src="${p.images[0]?.src || ''}"><div class="card-body"><div class="title">${p.name}</div><div class="price">${parseInt(p.price).toLocaleString()}៛</div><div class="qty-control"><button class="qty-btn" onclick="cardQtys[${pid}]=Math.max(1,cardQtys[${pid}]-1);document.getElementById('q-${pid}').innerText=cardQtys[${pid}]">−</button><span id="q-${pid}">1</span><button class="qty-btn" onclick="cardQtys[${pid}]++;document.getElementById('q-${pid}').innerText=cardQtys[${pid}]">+</button></div><button class="btn-add-cart" onclick="addToCart(${pid})">🛒 បន្ថែម</button></div></div>`;
        }).join('');
    }
    function addToCart(id) {
        const p = allProducts.find(x => x.id === id);
        const q = cardQtys[id];
        const ex = cart.find(i => i.id === id);
        if(ex) ex.qty += q; else cart.push({ id: p.id, name: p.name, price: parseFloat(p.price), qty: q });
        updateUI(); tg.HapticFeedback.impactOccurred('medium');
    }
    function updateUI() {
        document.getElementById('footer-ui').style.display = cart.length > 0 ? 'block' : 'none';
        const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        document.getElementById('cart-count').innerText = `🛒 កន្ត្រក: ${cart.length} មុខ`;
        document.getElementById('cart-total').innerText = `${total.toLocaleString()}៛`;
    }
    async function submitFinalOrder() {
        const orderData = { telegram_id: tg.initDataUnsafe.user?.id, name: document.getElementById('user-name').value, phone: document.getElementById('user-phone').value, location: document.getElementById('user-loc').value, items: cart, total: cart.reduce((s, i) => s + (i.price * i.qty), 0) };
        await fetch(`${RENDER_URL}/create-order`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(orderData) });
        tg.showAlert("ការកម្ម៉ង់ជោគជ័យ!", () => tg.close());
    }
    function startTimer(d) { let t = d, m, s; const disp = document.getElementById('pay-timer'); setInterval(() => { m = parseInt(t/60, 10); s = parseInt(t%60, 10); disp.textContent = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s); if(--t < 0) t=0; }, 1000); }
    function closePay() { document.getElementById('payment-screen').style.display = 'none'; }
    init();
</script>
</body>
</html>
